<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Play Off Timer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: #1a1a2e;
    color: #eee;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  .container {
    text-align: center;
  }

  .timer {
    font-size: clamp(5rem, 20vw, 12rem);
    font-variant-numeric: tabular-nums;
    font-weight: 200;
    letter-spacing: 0.02em;
    line-height: 1;
    padding: 0.2em 0;
    transition: color 0.3s;
  }

  .timer.overtime {
    color: #e74c3c;
  }

  .controls {
    display: flex;
    gap: 1.5rem;
    justify-content: center;
    margin-top: 1rem;
  }

  .controls button {
    width: clamp(4rem, 12vw, 6rem);
    height: clamp(4rem, 12vw, 6rem);
    border-radius: 50%;
    border: 2px solid rgba(255, 255, 255, 0.2);
    background: rgba(255, 255, 255, 0.05);
    color: #eee;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, border-color 0.15s;
  }

  .controls button:hover {
    background: rgba(255, 255, 255, 0.12);
    border-color: rgba(255, 255, 255, 0.4);
  }

  .controls button:active {
    background: rgba(255, 255, 255, 0.2);
  }

  .controls button svg {
    width: clamp(1.8rem, 5vw, 2.5rem);
    height: clamp(1.8rem, 5vw, 2.5rem);
    fill: currentColor;
  }

  .note {
    margin-top: 2rem;
    font-size: 0.85rem;
    color: rgba(255, 255, 255, 0.3);
  }
</style>
</head>
<body>

<div class="container">
  <div class="timer" id="timer">2:00</div>
  <div class="controls">
    <button id="playPauseBtn" title="Play / Pause">
      <svg id="playIcon" viewBox="0 0 24 24"><polygon points="6,3 20,12 6,21"/></svg>
      <svg id="pauseIcon" viewBox="0 0 24 24" style="display:none"><rect x="5" y="3" width="4" height="18"/><rect x="15" y="3" width="4" height="18"/></svg>
    </button>
    <button id="stopBtn" title="Stop">
      <svg viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
    </button>
  </div>
  <div class="note">2 minutes, then the orchestra plays you off</div>
</div>

<script>
const MUSIC_FILES = [
  'music/Classicals.de - Brahms - Symphony No. 1 in C Minor, Op. 68 - II. Andante sostenuto.mp3',
];

const DURATION = 2 * 60; // seconds

const timerEl = document.getElementById('timer');
const playPauseBtn = document.getElementById('playPauseBtn');
const stopBtn = document.getElementById('stopBtn');
const playIcon = document.getElementById('playIcon');
const pauseIcon = document.getElementById('pauseIcon');

let remaining = DURATION; // seconds remaining (goes negative after 0)
let running = false;
let intervalId = null;
let audio = null;

function formatTime(seconds) {
  const neg = seconds < 0;
  const abs = Math.abs(seconds);
  const m = Math.floor(abs / 60);
  const s = abs % 60;
  return (neg ? '-' : '') + m + ':' + String(s).padStart(2, '0');
}

function render() {
  timerEl.textContent = formatTime(remaining);
  timerEl.classList.toggle('overtime', remaining < 0);
  playIcon.style.display = running ? 'none' : '';
  pauseIcon.style.display = running ? '' : 'none';
}

function tick() {
  remaining--;
  if (remaining === -1) startMusic();
  render();
}

function startMusic() {
  if (audio) return;
  const file = MUSIC_FILES[Math.floor(Math.random() * MUSIC_FILES.length)];
  audio = new Audio(file);
  audio.loop = true;
  audio.play();
}

function play() {
  if (running) return;
  running = true;
  intervalId = setInterval(tick, 1000);
  if (audio && remaining < 0) audio.play();
  render();
}

function pause() {
  if (!running) return;
  running = false;
  clearInterval(intervalId);
  intervalId = null;
  if (audio) audio.pause();
  render();
}

function stop() {
  running = false;
  clearInterval(intervalId);
  intervalId = null;
  if (audio) { audio.pause(); audio = null; }
  remaining = DURATION;
  render();
}

playPauseBtn.addEventListener('click', () => running ? pause() : play());
stopBtn.addEventListener('click', stop);

render();
</script>

</body>
</html>
