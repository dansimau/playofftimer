<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Play Off Timer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: #1a1a2e;
    color: #eee;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  .container {
    text-align: center;
  }

  .timer {
    font-size: clamp(5rem, 20vw, 12rem);
    font-variant-numeric: tabular-nums;
    font-weight: 200;
    letter-spacing: 0.02em;
    line-height: 1;
    padding: 0.2em 0;
    transition: color 0.3s;
  }

  .timer.overtime {
    color: #e74c3c;
  }

  .controls {
    display: flex;
    gap: 1.5rem;
    justify-content: center;
    margin-top: 1rem;
  }

  .controls button {
    width: clamp(4rem, 12vw, 6rem);
    height: clamp(4rem, 12vw, 6rem);
    border-radius: 50%;
    border: 2px solid rgba(255, 255, 255, 0.2);
    background: rgba(255, 255, 255, 0.05);
    color: #eee;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, border-color 0.15s;
  }

  .controls button:hover {
    background: rgba(255, 255, 255, 0.12);
    border-color: rgba(255, 255, 255, 0.4);
  }

  .controls button:active {
    background: rgba(255, 255, 255, 0.2);
  }

  .controls button svg {
    width: clamp(1.8rem, 5vw, 2.5rem);
    height: clamp(1.8rem, 5vw, 2.5rem);
    fill: currentColor;
  }

  .duration-picker {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    margin-top: 1.5rem;
  }

  .duration-picker button {
    width: 2.2rem;
    height: 2.2rem;
    border-radius: 50%;
    border: 1px solid rgba(255, 255, 255, 0.2);
    background: rgba(255, 255, 255, 0.05);
    color: #eee;
    font-size: 1.2rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, border-color 0.15s;
  }

  .duration-picker button:hover {
    background: rgba(255, 255, 255, 0.12);
    border-color: rgba(255, 255, 255, 0.4);
  }

  .duration-picker .duration-label {
    font-size: 1rem;
    color: rgba(255, 255, 255, 0.5);
    min-width: 5rem;
    text-align: center;
  }

  .note {
    margin-top: 1.5rem;
    font-size: 0.85rem;
    color: rgba(255, 255, 255, 0.3);
  }
</style>
</head>
<body>

<div class="container">
  <div class="timer" id="timer">2:00</div>
  <div class="controls">
    <button id="playPauseBtn" title="Play / Pause">
      <svg id="playIcon" viewBox="0 0 24 24"><polygon points="6,3 20,12 6,21"/></svg>
      <svg id="pauseIcon" viewBox="0 0 24 24" style="display:none"><rect x="5" y="3" width="4" height="18"/><rect x="15" y="3" width="4" height="18"/></svg>
    </button>
    <button id="stopBtn" title="Stop">
      <svg viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
    </button>
  </div>
  <div class="duration-picker" id="durationPicker">
    <button id="decBtn" title="Decrease time">&#8722;</button>
    <span class="duration-label" id="durationLabel">2:00</span>
    <button id="incBtn" title="Increase time">+</button>
  </div>
  <div class="note">then the orchestra plays you off</div>
</div>

<script>
const MUSIC_FILES = [
  'music/Classicals.de - Brahms - Symphony No. 1 in C Minor, Op. 68 - II. Andante sostenuto.mp3',
];

const DEFAULT_DURATION = 2 * 60;
const STEP = 10; // seconds per increment
const MIN_DURATION = 10;
const MAX_DURATION = 10 * 60;

const timerEl = document.getElementById('timer');
const playPauseBtn = document.getElementById('playPauseBtn');
const stopBtn = document.getElementById('stopBtn');
const playIcon = document.getElementById('playIcon');
const pauseIcon = document.getElementById('pauseIcon');
const durationLabel = document.getElementById('durationLabel');
const durationPicker = document.getElementById('durationPicker');
const decBtn = document.getElementById('decBtn');
const incBtn = document.getElementById('incBtn');

function getCookie(name) {
  const m = document.cookie.match('(?:^|; )' + name + '=([^;]*)');
  return m ? decodeURIComponent(m[1]) : null;
}

function setCookie(name, value) {
  document.cookie = name + '=' + encodeURIComponent(value) + '; max-age=31536000; path=/; SameSite=Lax';
}

let duration = parseInt(getCookie('playoff_duration'), 10) || DEFAULT_DURATION;
if (duration < MIN_DURATION || duration > MAX_DURATION) duration = DEFAULT_DURATION;

let remaining = duration;
let running = false;
let intervalId = null;
let audio = null;

function formatTime(seconds) {
  const neg = seconds < 0;
  const abs = Math.abs(seconds);
  const m = Math.floor(abs / 60);
  const s = abs % 60;
  return (neg ? '-' : '') + m + ':' + String(s).padStart(2, '0');
}

function render() {
  timerEl.textContent = formatTime(remaining);
  timerEl.classList.toggle('overtime', remaining < 0);
  playIcon.style.display = running ? 'none' : '';
  pauseIcon.style.display = running ? '' : 'none';
  durationLabel.textContent = formatTime(duration);
  durationPicker.style.opacity = running || remaining !== duration ? '0.3' : '';
  durationPicker.style.pointerEvents = running || remaining !== duration ? 'none' : '';
}

function tick() {
  remaining--;
  if (remaining === -1) startMusic();
  render();
}

function startMusic() {
  if (audio) return;
  const file = MUSIC_FILES[Math.floor(Math.random() * MUSIC_FILES.length)];
  audio = new Audio(file);
  audio.loop = true;
  audio.play();
}

function setDuration(newDuration) {
  duration = Math.max(MIN_DURATION, Math.min(MAX_DURATION, newDuration));
  remaining = duration;
  setCookie('playoff_duration', duration);
  render();
}

function play() {
  if (running) return;
  running = true;
  intervalId = setInterval(tick, 1000);
  if (audio && remaining < 0) audio.play();
  render();
}

function pause() {
  if (!running) return;
  running = false;
  clearInterval(intervalId);
  intervalId = null;
  if (audio) audio.pause();
  render();
}

function stop() {
  running = false;
  clearInterval(intervalId);
  intervalId = null;
  if (audio) { audio.pause(); audio = null; }
  remaining = duration;
  render();
}

playPauseBtn.addEventListener('click', () => running ? pause() : play());
stopBtn.addEventListener('click', stop);

function addHoldRepeat(btn, action) {
  let holdTimer = null;
  let repeatTimer = null;

  function start(e) {
    e.preventDefault();
    action();
    holdTimer = setTimeout(() => {
      repeatTimer = setInterval(action, 150);
    }, 400);
  }

  function stop() {
    clearTimeout(holdTimer);
    clearInterval(repeatTimer);
    holdTimer = null;
    repeatTimer = null;
  }

  btn.addEventListener('mousedown', start);
  btn.addEventListener('touchstart', start, { passive: false });
  btn.addEventListener('mouseup', stop);
  btn.addEventListener('mouseleave', stop);
  btn.addEventListener('touchend', stop);
  btn.addEventListener('touchcancel', stop);
}

addHoldRepeat(decBtn, () => setDuration(duration - STEP));
addHoldRepeat(incBtn, () => setDuration(duration + STEP));

render();
</script>

</body>
</html>
